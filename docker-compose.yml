# 🦊 Fennec Customer Support — Docker Compose
# Usage: docker compose up --build

version: "3.9"

services:
  support-api:
    build: .
    container_name: fennec-support
    ports:
      - "8000:8000"
    environment:
      # ── Required ────────────────────────────────────────────────────────────
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # ── Optional LLM config ──────────────────────────────────────────────
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - EMBED_MODEL=${EMBED_MODEL:-text-embedding-3-small}

      # ── Optional alternative providers ──────────────────────────────────
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}

    volumes:
      # Mount knowledge base so you can update docs without rebuilding
      - ./knowledge_base:/app/knowledge_base:ro

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ── Optional: Nginx reverse proxy for production ──────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fennec-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - support-api
    profiles:
      - production   # Only starts with: docker compose --profile production up
