# Nginx reverse proxy for Fennec Customer Support
# Used with: docker compose --profile production up

upstream fennec_backend {
    server support-api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Client body size (for file uploads to knowledge base)
    client_max_body_size 20M;

    location / {
        proxy_pass http://fennec_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts (RAG can be slow on first query)
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;
    }

    # Health check endpoint — no logging
    location /health {
        proxy_pass http://fennec_backend/health;
        access_log off;
    }
}
